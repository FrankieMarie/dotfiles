# Prefix: C-a (easier reach than default C-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

# Mouse support
set -g mouse on

# Start numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Don't auto-rename windows
setw -g allow-rename off
setw -g automatic-rename off

# True color
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Larger scrollback
set -g history-limit 50000

# No escape delay (snappier feel inside nvim)
set -s escape-time 0

# pi agent config
set -g extended-keys on
set -g extended-keys-format csi-u

# Splits with | and -, opening in the current path
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Smart Ctrl-hjkl pane nav — passes through to nvim if active in pane,
# otherwise switches tmux panes. Pairs with vim-tmux-navigator on the nvim side.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?|fzf)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

# Vi-mode copy
setw -g mode-keys vi
set -g set-clipboard on
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"

set -g status-position top
