add_newline = true
command_timeout = 1000

format = """
$os$directory$git_branch$git_status$python$nodejs$lua$rust
$character"""

[os]
disabled = false
style = "bold white"

[os.symbols]
Arch = " "
Debian = " "

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "blue bold"

[git_branch]
symbol = " "
style = "purple"

[git_status]
style = "yellow"
ahead = "↑${count} "
behind = "↓${count} "
diverged = "↕${ahead_count}/${behind_count} "
modified = "● "
staged = "✚ "
untracked = "? "
stashed = "≡ "
conflicted = "! "

[cmd_duration]
min_time = 2000
format = "[$duration](yellow) "

[python]
symbol = " "
format = '[$symbol$pyenv_prefix($version)( \($virtualenv\))]($style) '

[nodejs]
symbol = " "
detect_files = ["package.json", ".nvmrc"]

[lua]
symbol = " "

[rust]
symbol = " "
